<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px;
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    outline: none;
}

.card {
    background: #1e293b;
    margin-top: 10px;
    padding: 15px;
    border-radius: 10px;
    border-left: 4px solid #22c55e;
}

.not-found {
    border-left: 4px solid red;
}
</style>
</head>

<body>

<div class="container">
<h2>Registration Search System</h2>

<input type="text" id="search" placeholder="Search name, engine, chassis, plate...">

<div id="results"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyNkdhLtycF9rV9YdS_iano3mW-rNKsjqGXKXtgUNw_Xo8YbT_1IFr8BHsubGiUr8RRhQ/exec";

const searchInput = document.getElementById("search");
const resultsDiv = document.getElementById("results");

let allData = [];
let isLoaded = false;

// LOAD DATA ONCE
async function loadData() {
    try {
        resultsDiv.innerHTML = "<div class='card'>Loading data...</div>";

        const res = await fetch(API_URL + "?t=" + new Date().getTime()); // cache buster
        const data = await res.json();

        allData = Array.isArray(data) ? data : [];
        isLoaded = true;

        resultsDiv.innerHTML = "<div class='card'>Data loaded. You can now search.</div>";

    } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = "<div class='card not-found'>FAILED TO LOAD DATA</div>";
    }
}

// IMPROVED SEARCH FUNCTION
function runSearch(query) {
    if (!isLoaded) return;

    const q = query.trim().toLowerCase();

    if (q.length === 0) {
        resultsDiv.innerHTML = "";
        return;
    }

    const filtered = allData.filter(item => {
        return (
            String(item.client_name || "").toLowerCase().includes(q) ||
            String(item.engine_no || "").toLowerCase().includes(q) ||
            String(item.chassis_no || "").toLowerCase().includes(q) ||
            String(item.plate_no || "").toLowerCase().includes(q) ||
            String(item.or_no || "").toLowerCase().includes(q) ||
            String(item.cr_no || "").toLowerCase().includes(q) ||
            String(item.branch || "").toLowerCase().includes(q)
        );
    });

    renderResults(filtered);
}

// RENDER FUNCTION (FIXED: no overwrite bugs)
function renderResults(data) {
    resultsDiv.innerHTML = "";

    if (!data || data.length === 0) {
        resultsDiv.innerHTML = "<div class='card not-found'>NOT REGISTERED</div>";
        return;
    }

    let html = "";

    data.forEach(item => {
        html += `
        <div class="card">
            <b>Client:</b> ${item.client_name || ""}<br>
            <b>Engine:</b> ${item.engine_no || ""}<br>
            <b>Chassis:</b> ${item.chassis_no || ""}<br>
            <b>Plate:</b> ${item.plate_no || ""}<br>
            <b>OR:</b> ${item.or_no || ""}<br>
            <b>CR:</b> ${item.cr_no || ""}<br>
            <b>Status:</b> ${item.status || ""}<br>
            <b>Branch:</b> ${item.branch || ""}
        </div>`;
    });

    resultsDiv.innerHTML = html;
}

// INPUT EVENT (DEBOUNCED FIX)
let timer;

searchInput.addEventListener("input", function () {
    clearTimeout(timer);

    timer = setTimeout(() => {
        runSearch(this.value);
    }, 150); // prevents lag when typing
});

loadData();

</script>

</body>
</html>
