<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px;
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    outline: none;
}

.card {
    background: #1e293b;
    margin-top: 10px;
    padding: 15px;
    border-radius: 10px;
    border-left: 4px solid #22c55e;
}

.not-found {
    border-left: 4px solid red;
}
</style>
</head>

<body>

<div class="container">
<h2>Registration Search System</h2>

<input type="text" id="search" placeholder="Search name, engine, chassis, plate...">

<div id="results"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxvTx1hFEZkHJkX2EObv6xk6gz7s13dclzRXseDgwwlurIRU0_hs6rhOPtXRRgxA4vMBg/exec";

const searchInput = document.getElementById("search");
const resultsDiv = document.getElementById("results");

let allData = [];

// LOAD DATA ONCE
async function loadData() {
    try {
        const res = await fetch(API_URL);
        allData = await res.json();
    } catch (err) {
        resultsDiv.innerHTML = "<div class='card not-found'>FAILED TO LOAD DATA</div>";
    }
}

// REAL-TIME SEARCH
searchInput.addEventListener("input", function () {
    let q = this.value.toLowerCase();

    if (!q) {
        resultsDiv.innerHTML = "";
        return;
    }

    let filtered = allData.filter(item =>
        (item.client_name || "").toLowerCase().includes(q) ||
        (item.engine_no || "").toLowerCase().includes(q) ||
        (item.chassis_no || "").toLowerCase().includes(q) ||
        (item.plate_no || "").toLowerCase().includes(q)
    );

    resultsDiv.innerHTML = "";

    if (filtered.length === 0) {
        resultsDiv.innerHTML = "<div class='card not-found'>NOT REGISTERED</div>";
        return;
    }

    filtered.forEach(item => {
        resultsDiv.innerHTML += `
        <div class="card">
            <b>Client:</b> ${item.client_name}<br>
            <b>Engine:</b> ${item.engine_no}<br>
            <b>Chassis:</b> ${item.chassis_no}<br>
            <b>Plate:</b> ${item.plate_no}<br>
            <b>OR:</b> ${item.or_no}<br>
            <b>CR:</b> ${item.cr_no}<br>
            <b>Status:</b> ${item.status}<br>
            <b>Branch:</b> ${item.branch}
        </div>`;
    });
});

loadData();

</script>

</body>
</html>
